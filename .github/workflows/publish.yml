name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.2.0)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sbom:
    name: release / sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - run: bash scripts/release/sbom.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  publish-npm:
    name: publish / npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - run: bash scripts/release/npm-publish.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attest npm provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669e5  # v2.3.0
        with:
          subject-path: "*.tgz"

  publish-pypi:
    name: publish / pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi-publish
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version-file: ".python-version"

      - run: bash scripts/release/pypi-publish.sh
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Attest PyPI provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669e5  # v2.3.0
        with:
          subject-path: "dist/*"

  publish-go:
    name: publish / go (pkg.go.dev)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: go-publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - run: bash scripts/release/go-publish.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}